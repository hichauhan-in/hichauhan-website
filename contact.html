<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact - Himanshu Chauhan</title>
    <link rel="icon" type="image/png" href="resources/logo.png">
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --void: #0A0A0A;
            --charcoal: #141414;
            --graphite: #1E1E1E;
            --steel: #2A2A2A;
            --teal: #00A896;
            --blue: #4A6FA5;
            --amber: #D4A574;
            --white: #FFFFFF;
            --grey: #B0B0B0;
            --muted: #808080;
            --red: #FF5F56;
        }
        
        body {
            font-family: 'JetBrains Mono', monospace;
            background: var(--void);
            background-image: radial-gradient(rgba(0, 168, 150, 0.07) 1px, transparent 1px);
            background-size: 30px 30px;
            color: var(--white);
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 24px;
        }

        /* Page Header */
        .page-header {
            width: 100%;
            max-width: 800px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
        }

        .page-title {
            font-size: 18px;
            text-transform: uppercase;
            letter-spacing: 3px;
            color: var(--teal);
            font-weight: 500;
            cursor: pointer;
            user-select: none;
            position: relative;
            transition: text-shadow 0.15s;
        }

        .page-title:hover {
            text-shadow: 0 0 12px rgba(0, 168, 150, 0.5);
        }

        .page-title.glitching {
            animation: titleGlitch 0.06s steps(1) infinite;
        }

        @keyframes titleGlitch {
            0%   { transform: translate(0); }
            20%  { transform: translate(-2px, 1px); }
            40%  { transform: translate(2px, -1px); }
            60%  { transform: translate(-1px, -2px); }
            80%  { transform: translate(1px, 2px); }
            100% { transform: translate(0); }
        }

        .page-nav {
            font-size: 11px;
            color: var(--muted);
            text-decoration: none;
            padding: 5px 12px;
            border: 1px solid var(--steel);
            border-radius: 4px;
            transition: all 0.2s;
        }

        .page-nav:hover {
            color: var(--teal);
            border-color: var(--teal);
        }

        .terminal {
            width: 100%;
            max-width: 800px;
            background: var(--graphite);
            border: 1px solid var(--steel);
            border-radius: 10px;
            box-shadow: 0 24px 80px rgba(0, 0, 0, 0.6);
            overflow: hidden;
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .terminal.minimized {
            transform: scale(0.02);
            opacity: 0;
            pointer-events: none;
        }

        .terminal.glitch {
            animation: glitchShake 0.1s infinite;
        }

        .terminal.zoomed .terminal-body {
            font-size: 120px;
            line-height: 1;
            overflow: hidden;
        }

        @keyframes glitchShake {
            0% { transform: translate(0, 0) skewX(0deg); }
            25% { transform: translate(-3px, 1px) skewX(-1deg); }
            50% { transform: translate(2px, -2px) skewX(0.5deg); }
            75% { transform: translate(-1px, 2px) skewX(-0.5deg); }
            100% { transform: translate(1px, -1px) skewX(1deg); }
        }

        .minimized-dot {
            width: 20px;
            height: 20px;
            background: var(--teal);
            border-radius: 50%;
            cursor: pointer;
            animation: pulse 1.5s infinite;
            display: none;
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
        }

        .minimized-dot::after {
            content: attr(data-msg);
            position: absolute;
            top: -30px;
            left: 50%;
            transform: translateX(-50%);
            white-space: nowrap;
            font-size: 11px;
            color: var(--muted);
            font-family: 'JetBrains Mono', monospace;
        }

        .terminal-bar {
            display: flex;
            align-items: center;
            padding: 14px 20px;
            background: var(--charcoal);
            border-bottom: 1px solid var(--steel);
            gap: 8px;
        }

        .dot { width: 12px; height: 12px; border-radius: 50%; cursor: pointer; transition: transform 0.15s; }
        .dot:hover { transform: scale(1.3); }
        .dot.r { background: var(--red); }
        .dot.y { background: #FFBD2E; }
        .dot.g { background: #27CA3F; }

        .bar-title {
            margin-left: 12px;
            color: var(--muted);
            font-size: 12px;
            flex: 1;
        }

        .terminal-body {
            padding: 28px 24px;
            font-size: 13px;
            line-height: 2;
            height: 480px;
            overflow-y: auto;
        }

        .terminal-body::-webkit-scrollbar { width: 4px; }
        .terminal-body::-webkit-scrollbar-track { background: transparent; }
        .terminal-body::-webkit-scrollbar-thumb { background: var(--steel); border-radius: 2px; }

        .line { opacity: 0; animation: fadeIn 0.3s ease forwards; }
        .p { color: var(--teal); }
        .c { color: var(--white); }
        .o { color: var(--grey); }
        .h { color: var(--amber); }
        .l { color: var(--blue); text-decoration: none; transition: color 0.2s; }
        .l:hover { color: var(--teal); }
        .e { color: var(--red); }
        .d { color: var(--muted); font-style: italic; }
        .s { color: var(--steel); }

        .gap { margin-top: 8px; }
        .big-gap { margin-top: 16px; }

        .status-bar {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 24px;
            background: var(--charcoal);
            border-top: 1px solid var(--steel);
            font-size: 11px;
            color: var(--muted);
        }

        .status-dot {
            width: 7px;
            height: 7px;
            background: var(--teal);
            border-radius: 50%;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { box-shadow: 0 0 0 0 rgba(0,168,150,0.5); }
            50% { box-shadow: 0 0 0 5px rgba(0,168,150,0); }
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(4px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes blink {
            0%, 50% { opacity: 1; }
            51%, 100% { opacity: 0; }
        }

        .cursor { animation: blink 1s step-end infinite; color: var(--teal); }

        /* Contact buttons */
        .contact-buttons {
            display: flex;
            gap: 12px;
            max-width: 800px;
            width: 100%;
        }

        .contact-btn {
            flex: 1;
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 12px 16px;
            background: var(--graphite);
            border: 1px solid var(--steel);
            border-radius: 8px;
            color: var(--grey);
            text-decoration: none;
            font-family: 'JetBrains Mono', monospace;
            font-size: 12px;
            transition: all 0.25s ease;
        }

        .contact-btn:hover {
            border-color: var(--teal);
            color: var(--teal);
            transform: translateY(-2px);
            box-shadow: 0 4px 20px rgba(0, 168, 150, 0.15);
        }

        .contact-btn .btn-icon {
            font-size: 14px;
            opacity: 0.7;
        }

        .contact-btn:hover .btn-icon {
            opacity: 1;
        }

        .contact-btn .btn-label {
            color: var(--muted);
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .contact-btn .btn-value {
            color: inherit;
        }

        .contact-btn .btn-text {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        @media (max-width: 768px) {
            body { padding: 24px 16px; }
            .terminal { max-width: 100%; }
            .terminal-body { padding: 20px 16px; font-size: 12px; height: 320px; }
            .contact-buttons { flex-wrap: wrap; }
            .contact-btn { flex: 1 1 45%; }
        }

        .chaos-hint { position:absolute; font-family:'JetBrains Mono',monospace; font-size:10px; color:#D4A574; opacity:0; pointer-events:none; transition:opacity 0.3s; white-space:nowrap; z-index:100; }
        .chaos-hint::before { content:'\26A0  '; }
        body.hints-active .chaos-hint { opacity:1; animation:hintPulse 2s ease-in-out infinite; }
        @keyframes hintPulse { 0%,100%{opacity:0.7} 50%{opacity:1} }
        .hints-toggle { position:fixed; bottom:24px; left:24px; display:flex; align-items:center; gap:10px; background:#1E1E1E; border:1px solid #2A2A2A; border-radius:20px; padding:6px 14px 6px 8px; cursor:pointer; z-index:4500; transition:all 0.2s; opacity:0.5; font-family:'JetBrains Mono',monospace; }
        .hints-toggle:hover { opacity:0.9; border-color:#808080; }
        .hints-toggle.active { border-color:#D4A574; opacity:1; box-shadow:0 0 12px rgba(212,165,116,0.15); }
        .hints-toggle .toggle-track { width:28px; height:14px; background:#2A2A2A; border-radius:7px; position:relative; transition:background 0.2s; }
        .hints-toggle.active .toggle-track { background:rgba(212,165,116,0.4); }
        .hints-toggle .toggle-knob { width:10px; height:10px; background:#808080; border-radius:50%; position:absolute; top:2px; left:2px; transition:all 0.2s; }
        .hints-toggle.active .toggle-knob { left:16px; background:#D4A574; }
        .hints-toggle .toggle-label { font-size:10px; color:#808080; text-transform:uppercase; letter-spacing:1px; }
        .hints-toggle.active .toggle-label { color:#D4A574; }
    </style>
</head>
<body>
    <header class="page-header" style="position:relative;">
        <h1 class="page-title">Contact</h1>
        <a href="index.html" class="page-nav">cd ~/</a>
    </header>

    <span class="chaos-hint" style="position:relative; display:block; width:100%; max-width:800px; margin:0 auto; padding:0; top:-12px; margin-bottom:-8px; text-align:left;">click the title. also the dots. especially the dots.</span>

    <div class="minimized-dot" id="minDot" data-msg="click to respawn, genius"></div>
    <div class="terminal" id="terminal">
        <div class="terminal-bar">
            <div class="dot r"></div>
            <div class="dot y"></div>
            <div class="dot g"></div>
            <span class="bar-title">hichauhan@blr:~/contact</span>
        </div>
        <div class="terminal-body" id="output"></div>
        <div class="status-bar">
            <span class="status-dot"></span>

    <div class="contact-buttons">
        <a href="mailto:hichauhan.in@gmail.com" class="contact-btn">

        <a href="https://www.linkedin.com/in/hichauhan-in/" target="_blank" class="contact-btn">
            <span class="btn-icon">⬡</span>

    <div class="hints-toggle" id="hintsToggle"><div class="toggle-track"><div class="toggle-knob"></div></div><span class="toggle-label">hints</span></div>

    <script>
        const lines = [
            { type: 'cmd', text: './contact.sh --verbose' },
            { type: 'dim', text: '# Look, you found the contact page.' },
            { type: 'dim', text: '# I\'m genuinely surprised you didn\'t just close the tab.' },
            { type: 'out', text: '' },
            { type: 'cmd', text: 'cat ./README.md' },
            { type: 'head', text: '## Rules of Engagement' },
            { type: 'out', text: '1. No "Hi" messages with nothing else. I will stare at it.' },
            { type: 'out', text: '2. Email > LinkedIn DM > Carrier pigeon > Smoke signals' },
            { type: 'out', text: '3. Response time: 24hrs (weekdays) / "eventually" (weekends)' },
            { type: 'out', text: '4. If you\'re a recruiter: yes I read your message. No I didn\'t reply.' },
            { type: 'out', text: '   Just kidding. Maybe. Send it anyway.' },
            { type: 'out', text: '' },
            { type: 'cmd', text: 'echo $AVAILABILITY' },
            { type: 'highlight', text: 'Open to opportunities. Convince me.' },
            { type: 'out', text: '' },
            { type: 'cursor', text: '' },
        ];

        const output = document.getElementById('output');
        let i = 0;

        function renderLine(item) {
            const div = document.createElement('div');
            div.className = 'line';
            div.style.animationDelay = '0s';

            switch (item.type) {
                case 'cmd':
                    div.innerHTML = `<span class="p">~$</span> <span class="c">${item.text}</span>`;
                    break;
                case 'out':
                    div.innerHTML = `<span class="o">${item.text || '&nbsp;'}</span>`;
                    break;
                case 'head':
                    div.innerHTML = `<span class="h">${item.text}</span>`;
                    break;
                case 'dim':
                    div.innerHTML = `<span class="d">${item.text}</span>`;
                    break;
                case 'err':
                    div.innerHTML = `<span class="e">${item.text}</span>`;
                    break;
                case 'highlight':
                    div.innerHTML = `<span class="h">${item.text}</span>`;
                    break;

                case 'cursor':
                    div.innerHTML = `<span class="p">~$</span> <span class="cursor">▊</span>`;
                    break;
            }

            output.appendChild(div);
            output.scrollTop = output.scrollHeight;
        }

        function typeLines() {
            if (i < lines.length) {
                renderLine(lines[i]);
                i++;
                const delay = lines[i-1].type === 'cmd' ? 400 : 
                              lines[i-1].type === 'out' && !lines[i-1].text ? 80 : 120;
                setTimeout(typeLines, delay);
            }
        }

        // Start typing after a brief pause
        setTimeout(typeLines, 500);

        // === DOT BUTTON MADNESS ===
        const terminal = document.getElementById('terminal');
        const minDot = document.getElementById('minDot');
        const contactBtns = document.querySelector('.contact-buttons');
        let dotBusy = false;

        // Sarcastic double-click tracking
        const clickCounts = { r: 0, y: 0, g: 0 };
        const sarcasticMessages = {
            r: [
                "You liked the crash that much? Seek help.",
                "Again? Do you also restart your PC for fun?",
                "Bro it's not a slot machine.",
                "The system already died once for you. Show some respect.",
                "PTSD isn't just for humans. My terminal remembers.",
                "You're the kind of person who presses elevator buttons twice.",
                "One crash wasn't enough? You debug in production too, don't you?",
                "I'm starting to think you enjoy watching things suffer.",
            ],
            y: [
                "It disappeared once and you want it again? Attachment issues?",
                "You minimize your problems like this too?",
                "Congrats, you found the world's least useful button. Twice.",
                "It's gone. It came back. What more do you want from it?",
                "Are you testing if I have feelings? I do. And they're annoyed.",
                "You minimize windows like you minimize red flags in relationships.",
                "Poof. Again. Wow. Very productive use of your time.",
                "This isn't peekaboo. You're an adult. Allegedly.",
            ],
            g: [
                "Still not a keynote. Still not impressed.",
                "The H is not going to get any bigger. Let it go.",
                "You click this again and I'm charging per zoom.",
                "What did you expect this time? A TED talk?",
                "Zoom. Enhance. Zoom. Enhance. This isn't CSI Miami.",
                "The font size has a restraining order against you now.",
                "You zoom like my manager reads emails — repeatedly, no comprehension.",
                "If you squint hard enough, you can see my patience running out.",
            ],
        };

        function showSarcasticPrompt(color) {
            const msgs = sarcasticMessages[color];
            const msg = msgs[Math.floor(Math.random() * msgs.length)];
            const overlay = document.createElement('div');
            overlay.style.cssText = `
                position: fixed; top: 0; left: 0; width: 100%; height: 100%;
                background: rgba(10,10,10,0.85); display: flex; align-items: center;
                justify-content: center; z-index: 9999; flex-direction: column; gap: 16px;
            `;
            overlay.innerHTML = `
                <div style="font-family: 'JetBrains Mono', monospace; font-size: 14px; color: var(--amber); max-width: 500px; text-align: center; line-height: 1.8;">${msg}</div>
                <div style="font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--muted); cursor: pointer;" id="sarcasm-dismiss">[press anywhere to continue being chaotic]</div>
            `;
            document.body.appendChild(overlay);
            overlay.addEventListener('click', () => {
                overlay.remove();
            });
        }

        // RED: Kernel Panic
        document.querySelector('.dot.r').addEventListener('click', () => {
            if (dotBusy) return;
            clickCounts.r++;
            if (clickCounts.r > 1) { showSarcasticPrompt('r'); return; }
            dotBusy = true;
            const body = document.getElementById('output');
            
            terminal.classList.add('glitch');
            body.innerHTML = '';
            
            const panicLines = [
                '[FATAL] Signal 11 (SIGSEGV) received',
                'Kernel panic - not syncing: Attempted to kill init!',
                'Stack trace:',
                '  #0  0xDEADBEEF in why_did_you_click_that()',
                '  #1  0xCAFEBABE in seriously_dont_touch()',
                '  #2  0xBAADF00D in user_has_no_chill()',
                '  #3  0x8BADF00D in brain.exe has stopped working',
                '',
                'Dumping registers... EAX=NOPE ECX=STOP EDX=WHY',
                'Core dumped. Feelings also dumped.',
                '',
                '--- [ end trace ]---',
                '',
                'Respawning in 3...',
                'Respawning in 2...',
                'Respawning in 1...',
                '',
                '✓ Just kidding. I\'m immortal.',
            ];
            
            let pi = 0;
            function panicType() {
                if (pi < panicLines.length) {
                    const div = document.createElement('div');
                    div.className = 'line';
                    div.style.animationDelay = '0s';
                    const color = pi < 11 ? 'e' : (pi >= 14 ? 'h' : 'o');
                    div.innerHTML = `<span class="${color}">${panicLines[pi] || '&nbsp;'}</span>`;
                    body.appendChild(div);
                    body.scrollTop = body.scrollHeight;
                    pi++;
                    setTimeout(panicType, pi > 11 ? 600 : 80);
                } else {
                    setTimeout(() => {
                        terminal.classList.remove('glitch');
                        body.innerHTML = '';
                        lines.forEach(item => renderLine(item));
                        dotBusy = false;
                    }, 1500);
                }
            }
            setTimeout(panicType, 300);
        });

        // Sarcastic minimize messages
        const minimizeMessages = [
            'click to respawn, genius',
            'wow you actually minimized it',
            'the terminal has feelings too',
            'it\'s not gone, it\'s just hiding',
            'congratulations, you broke nothing',
            'poke me to bring it back',
            'was the terminal too scary?',
            'it\'ll come back. unlike your ex.',
            'minimizing problems doesn\'t solve them',
            'the dot is the terminal now. deal with it.',
            'you\'ll want it back in 3... 2...',
            'this is what commitment issues look like',
            'out of sight, still in DOM',
            'the terminal is judging you from here',
            'ctrl+z won\'t help you here',
        ];

        // YELLOW: Minimize to dot
        document.querySelector('.dot.y').addEventListener('click', () => {
            if (dotBusy) return;
            clickCounts.y++;
            if (clickCounts.y > 1) { showSarcasticPrompt('y'); return; }
            dotBusy = true;
            terminal.classList.add('minimized');
            contactBtns.style.opacity = '0';
            contactBtns.style.pointerEvents = 'none';
            contactBtns.style.transition = 'opacity 0.3s';
            minDot.setAttribute('data-msg', minimizeMessages[Math.floor(Math.random() * minimizeMessages.length)]);
            setTimeout(() => {
                minDot.style.display = 'block';
                dotBusy = false;
            }, 500);
        });

        minDot.addEventListener('click', () => {
            minDot.style.display = 'none';
            contactBtns.style.opacity = '1';
            contactBtns.style.pointerEvents = '';
            setTimeout(() => terminal.classList.remove('minimized'), 20);
            clickCounts.y = 0;
        });

        // GREEN: Absurd zoom
        document.querySelector('.dot.g').addEventListener('click', () => {
            if (dotBusy) return;
            clickCounts.g++;
            if (clickCounts.g > 1) { showSarcasticPrompt('g'); return; }
            dotBusy = true;
            const body = document.getElementById('output');
            
            body.innerHTML = '';
            const bigDiv = document.createElement('div');
            bigDiv.style.cssText = 'font-size: 200px; line-height: 1; color: var(--teal); text-align: center; padding: 40px 0; transition: font-size 0.5s;';
            bigDiv.textContent = 'H';
            body.appendChild(bigDiv);

            const msgs = ['H', 'Hi', 'Hi.', '...', 'too much?'];
            let mi = 0;
            
            const zoomInterval = setInterval(() => {
                mi++;
                if (mi < msgs.length) {
                    bigDiv.textContent = msgs[mi];
                    bigDiv.style.fontSize = (200 - mi * 35) + 'px';
                } else {
                    clearInterval(zoomInterval);
                    bigDiv.style.fontSize = '14px';
                    bigDiv.style.color = 'var(--muted)';
                    bigDiv.textContent = 'calm down. this isn\'t a keynote.';
                    setTimeout(() => {
                        body.innerHTML = '';
                        lines.forEach(item => renderLine(item));
                        dotBusy = false;
                    }, 2000);
                }
            }, 700);
        });

        // ====== TITLE CHAOS ENGINE ======
        const pageTitle = document.querySelector('.page-title');
        const originalTitle = pageTitle.textContent;
        let titleBusy = false;

        const madContactTitles = [
            'DON\'T SPAM ME', 'INBOX ZERO DREAM', 'PLEASE NO RECRUITERS',
            'READ RECEIPTS OFF', 'REPLY EVENTUALLY', 'EMAIL ANXIETY',
            'TYPING...', 'SEEN AT 3AM', 'UNREAD: 99+',
            'PING ME MAYBE', '404 SOCIAL SKILLS', 'DO NOT DISTURB',
            'AVAILABLE-ISH', 'MUTED NOTIFICATIONS', 'ASYNC ONLY',
            'NO MEETINGS PLEASE', 'JUST SEND AN EMAIL', 'HI IS NOT A MESSAGE',
            'WILL RESPOND MONDAY', 'OUT OF OFFICE FOREVER',
            'SLACK IS NOT URGENT', 'CARRIER PIGEON PREFERRED',
            'AUTORESPONDER ON', 'CONNECTION TIMEOUT', 'REACH ME IF YOU CAN',
        ];

        pageTitle.addEventListener('click', () => {
            if (titleBusy) return;
            titleBusy = true;

            const target = madContactTitles[Math.floor(Math.random() * madContactTitles.length)];
            const scrambleChars = '\u2588\u2593\u2592\u2591\u2580\u2584\u258c\u2590!@#$%&*<>{}[]|/\\^~';

            // Phase 1: Scramble out current text
            let frame = 0;
            const outTotal = 10;
            const outInterval = setInterval(() => {
                frame++;
                const text = pageTitle.textContent;
                pageTitle.textContent = text.split('').map(c =>
                    c === ' ' ? ' ' : (Math.random() < frame / outTotal ? scrambleChars[Math.floor(Math.random() * scrambleChars.length)] : c)
                ).join('');
                if (frame >= outTotal) {
                    clearInterval(outInterval);
                    // Phase 2: Scramble in new text
                    let inFrame = 0;
                    const inTotal = 12;
                    const padded = target.padEnd(Math.max(target.length, originalTitle.length));
                    const inInterval = setInterval(() => {
                        inFrame++;
                        pageTitle.textContent = padded.split('').map((c, i) =>
                            c === ' ' ? ' ' : (Math.random() < inFrame / inTotal ? c : scrambleChars[Math.floor(Math.random() * scrambleChars.length)])
                        ).join('').trimEnd();
                        if (inFrame >= inTotal) {
                            clearInterval(inInterval);
                            pageTitle.textContent = target;
                            // Phase 3: Hold, then scramble back to original
                            setTimeout(() => {
                                let revFrame = 0;
                                const revTotal = 12;
                                const revInterval = setInterval(() => {
                                    revFrame++;
                                    const src = pageTitle.textContent;
                                    const orig = originalTitle.padEnd(Math.max(originalTitle.length, src.length));
                                    pageTitle.textContent = orig.split('').map((c, i) =>
                                        c === ' ' ? ' ' : (Math.random() < revFrame / revTotal ? c : scrambleChars[Math.floor(Math.random() * scrambleChars.length)])
                                    ).join('').trimEnd();
                                    if (revFrame >= revTotal) {
                                        clearInterval(revInterval);
                                        pageTitle.textContent = originalTitle;
                                        titleBusy = false;
                                    }
                                }, 40);
                            }, 2000);
                        }
                    }, 40);
                }
            }, 40);
        });

        // Hints system
        (function() {
            const toggle = document.getElementById('hintsToggle');
            if (!toggle) return;
            let toggleCount = 0;

            const enableMessages = [
                "Couldn't figure it out on your own, huh?",
                "Skill issue detected. Hints: ON.",
                "Fine. I'll hold your hand through this.",
                "Welcome to easy mode, champ.",
                "Even the easter eggs feel sorry for you now.",
                "Hint: you're bad at this. There, free hint.",
                "Training wheels: engaged.",
                "Imagine needing help on a personal website.",
                "The easter eggs were hiding FROM you.",
                "Assistance mode activated. Dignity mode deactivated.",
            ];

            const reEnableMessages = [
                "Back already? That was embarrassing.",
                "Loser mode: re-engaged.",
                "Ah, the quitter returns.",
                "Couldn't last 10 seconds without help. Noted.",
                "You had one job: not need hints. You failed.",
                "The hints missed you too. (They didn't.)",
                "Round 2 of giving up. Impressive consistency.",
                "Welcome back to the kiddie pool.",
                "Even the toggle is judging you right now.",
                "Speedrun: giving up any% WR.",
            ];

            const disableMessages = [
                "Respect. Going in blind.",
                "Brave. Stupid, but brave.",
                "Challenge accepted? Bold of you.",
                "Fine, do it the hard way. I believe in you. (I don't.)",
                "Hints off. Good luck, you'll need it.",
                "Hardcore mode. This won't end well.",
                "Plot twist: you'll be back in 30 seconds.",
                "The easter eggs just got harder. (Not really.)",
                "Going commando. I respect the energy.",
                "Timer starts now. Let's see how long you last.",
            ];

            function showRemark(msg) {
                const existing = document.querySelector('.hints-remark');
                if (existing) existing.remove();
                const el = document.createElement('div');
                el.className = 'hints-remark';
                el.textContent = msg;
                el.style.cssText = 'position:fixed;bottom:70px;left:24px;background:#1E1E1E;border:1px solid #2A2A2A;border-radius:6px;padding:8px 14px;font-family:JetBrains Mono,monospace;font-size:11px;color:#D4A574;z-index:4600;opacity:0;transform:translateY(8px);transition:opacity 0.3s,transform 0.3s;max-width:280px;pointer-events:none;';
                document.body.appendChild(el);
                requestAnimationFrame(() => { el.style.opacity = '1'; el.style.transform = 'translateY(0)'; });
                setTimeout(() => { el.style.opacity = '0'; el.style.transform = 'translateY(8px)'; setTimeout(() => el.remove(), 300); }, 2500);
            }

            if (localStorage.getItem('chaos-hints') === 'on') {
                document.body.classList.add('hints-active');
                toggle.classList.add('active');
            }
            toggle.addEventListener('click', () => {
                const active = document.body.classList.toggle('hints-active');
                toggle.classList.toggle('active', active);
                localStorage.setItem('chaos-hints', active ? 'on' : 'off');
                toggleCount++;
                if (active) {
                    const pool = toggleCount > 1 ? reEnableMessages : enableMessages;
                    showRemark(pool[Math.floor(Math.random() * pool.length)]);
                } else {
                    showRemark(disableMessages[Math.floor(Math.random() * disableMessages.length)]);
                }
            });
        })();
    </script>
</body>
</html>
