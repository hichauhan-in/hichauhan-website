<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CV - Himanshu Chauhan</title>
    <link rel="icon" type="image/png" href="resources/logo.png">
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --void: #0A0A0A;
            --charcoal: #141414;
            --graphite: #1E1E1E;
            --steel: #2A2A2A;
            --teal: #00A896;
            --blue: #4A6FA5;
            --amber: #D4A574;
            --white: #FFFFFF;
            --grey: #B0B0B0;
            --muted: #808080;
            --red: #FF5F56;
        }
        
        body {
            font-family: 'JetBrains Mono', monospace;
            background: var(--void);
            background-image: radial-gradient(rgba(0, 168, 150, 0.07) 1px, transparent 1px);
            background-size: 30px 30px;
            color: var(--white);
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }

        .viewer-container {
            width: 100%;
            max-width: 900px;
            height: 100%;
            max-height: calc(100vh - 48px);
            display: flex;
            flex-direction: column;
            background: var(--graphite);
            border: 1px solid var(--steel);
            border-radius: 10px;
            box-shadow: 0 24px 80px rgba(0, 0, 0, 0.6);
            overflow: hidden;
        }

        .viewer-bar {
            display: flex;
            align-items: center;
            padding: 12px 20px;
            background: var(--charcoal);
            border-bottom: 1px solid var(--steel);
            gap: 8px;
            flex-shrink: 0;
        }

        .dot { width: 12px; height: 12px; border-radius: 50%; }
        .dot.r { background: var(--red); }
        .dot.y { background: #FFBD2E; }
        .dot.g { background: #27CA3F; }

        .bar-title {
            margin-left: 12px;
            color: var(--muted);
            font-size: 12px;
            flex: 1;
        }

        .bar-actions {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .bar-btn {
            font-size: 11px;
            color: var(--muted);
            text-decoration: none;
            padding: 5px 12px;
            border: 1px solid var(--steel);
            border-radius: 4px;
            transition: all 0.2s;
            cursor: pointer;
            background: none;
            font-family: 'JetBrains Mono', monospace;
        }

        .bar-btn:hover {
            color: var(--teal);
            border-color: var(--teal);
        }

        .bar-btn.download {
            color: var(--teal);
            border-color: var(--teal);
        }

        .bar-btn.download:hover {
            background: var(--teal);
            color: var(--void);
        }

        .pdf-viewer {
            flex: 1;
            width: 100%;
            border: none;
            background: var(--charcoal);
        }

        .status-bar {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 8px 20px;
            background: var(--charcoal);
            border-top: 1px solid var(--steel);
            font-size: 11px;
            color: var(--muted);
            flex-shrink: 0;
        }

        .status-bar .sep {
            width: 1px;
            height: 12px;
            background: var(--steel);
        }

        @media (max-width: 768px) {
            body { padding: 12px; }
            .viewer-container { max-width: 100%; border-radius: 8px; }
            .bar-title { display: none; }
        }
    </style>
</head>
<body>
    <div class="viewer-container">
        <div class="viewer-bar">
            <div class="dot r"></div>
            <div class="dot y"></div>
            <div class="dot g"></div>
            <span class="bar-title">cv.pdf — Himanshu Chauhan</span>
            <div class="bar-actions">
                <a href="index.html" class="bar-btn">cd ~/</a>
                <a href="resources/cv.pdf" download class="bar-btn download">⬇ Download</a>
            </div>
        </div>
        <iframe src="resources/cv.pdf" class="pdf-viewer" title="CV - Himanshu Chauhan"></iframe>
        <div class="status-bar">
            <span>PDF</span>
            <span class="sep"></span>
            <span>resources/cv.pdf</span>
            <span style="margin-left: auto;">Himanshu Chauhan — Windows Debug Engineer</span>
        </div>
    </div>
</body>
</html>
